<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ç؛؟ç¨‹و± ç®،çگ?/title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .header { text-align: center; padding: 30px 20px 10px; }
        .header h1 { color: #1a1a2e; font-size: 22px; }
        .msg { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 999; max-width: 600px; padding: 10px 24px; border-radius: 8px; font-size: 13px; visibility: hidden; opacity: 0; transition: opacity 0.3s; }
        .msg-success { background: #e6f7e6; color: #2e7d32; border: 1px solid #b7eb8f; visibility: visible; opacity: 1; }
        .msg-error { background: #fff2f0; color: #cf1322; border: 1px solid #ffccc7; visibility: visible; opacity: 1; }
        .main { display: flex; gap: 24px; max-width: 1280px; margin: 0 auto 40px; padding: 0 20px; align-items: flex-start; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
        .card h2 { font-size: 16px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #4a6cf7; color: #1a1a2e; }
        .card h2 .toggle { float: right; cursor: pointer; font-size: 18px; color: #999; user-select: none; }
        .left-panel { flex: 0 0 420px; }
        .right-panel { flex: 1; min-width: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
        .form-group input, .form-group select { padding: 8px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #4a6cf7; box-shadow: 0 0 0 3px rgba(74,108,247,0.1); }
        .form-group input.error, .form-group select.error { border-color: #cf1322; }
        .btn-row { display: flex; gap: 10px; margin-top: 18px; }
        .btn { padding: 8px 22px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #4a6cf7; color: #fff; }
        .btn-primary:hover { background: #3a5ce5; }
        .btn-reset { background: #e8ecf1; color: #555; }
        .btn-reset:hover { background: #d5dbe3; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .info-table td:first-child { font-weight: 600; color: #666; width: 120px; }
        .info-table td:last-child { font-family: 'Consolas', 'Courier New', monospace; color: #1a1a2e; }
        .tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px; }
        .tag-green { background: #e6f7e6; color: #2e7d32; }
        .tag-orange { background: #fff3e0; color: #e65100; }
        .refresh-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .refresh-bar span { font-size: 12px; color: #888; }
        .note { font-size: 12px; color: #999; margin-top: 12px; padding: 8px 10px; background: #fafafa; border-radius: 6px; line-height: 1.6; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .chart-box { position: relative; height: 180px; }
        .chart-box canvas { width: 100% !important; height: 100% !important; }
        .scale-row { display: flex; gap: 16px; margin-bottom: 12px; align-items: center; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 24px; transition: .3s; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #fff; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: #4a6cf7; }
        input:checked + .slider:before { transform: translateX(20px); }
        .event-list { max-height: 200px; overflow-y: auto; }
        .event-item { font-size: 12px; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 10px; }
        .event-time { color: #999; white-space: nowrap; }
        .event-dir-up { color: #cf1322; font-weight: 600; }
        .event-dir-down { color: #2e7d32; font-weight: 600; }
        @media (max-width: 860px) {
            .main { flex-direction: column; }
            .left-panel { flex: none; }
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>ç؛؟ç¨‹و± هٹ¨و€پç®،çگ?/h1>
</div>

<div id="msgBox" class="msg"></div>

<div class="main">
    <!-- ه·¦ن¾§ï¼ڑه®‍و—¶çٹ¶و€?-->
    <div class="card left-panel">
        <h2>ه®‍و—¶çٹ¶و€?/h2>
        <div class="refresh-bar">
            <button class="btn btn-reset" onclick="refreshInfo()" style="padding:5px 14px;">هˆ·و–°çٹ¶و€?/button>
            <span id="refreshTime"></span>
        </div>
        <table class="info-table" id="infoTable">
            <tr><td colspan="2" style="text-align:center;color:#999;">هٹ è½½ن¸?..</td></tr>
        </table>
    </div>

    <!-- هڈ³ن¾§ï¼ڑé…چç½?+ è¶‹هٹ؟ + ن¼¸ç¼© -->
    <div class="right-panel">
        <div class="card" id="configCard">
            <h2>ن؟®و”¹é…چç½®</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>و ¸ه؟ƒç؛؟ç¨‹و•?(corePoolSize)</label>
                    <input type="number" id="corePoolSize" min="1" max="500" onchange="validateCoreMax()">
                </div>
                <div class="form-group">
                    <label>وœ€ه¤§ç؛؟ç¨‹و•° (maximumPoolSize)</label>
                    <input type="number" id="maximumPoolSize" min="1" max="500" onchange="validateCoreMax()">
                </div>
                <div class="form-group">
                    <label>ه­کو´»و—¶é—´ (keepAliveTime)</label>
                    <input type="number" id="keepAliveTime" min="0">
                </div>
                <div class="form-group">
                    <label>و—¶é—´هچ•ن½چ (timeUnit)</label>
                    <select id="timeUnit">
                        <option value="SECONDS">SECONDS - ç§?/option>
                        <option value="MINUTES">MINUTES - هˆ†é’ں</option>
                        <option value="HOURS">HOURS - ه°ڈو—¶</option>
                        <option value="DAYS">DAYS - ه¤?/option>
                    </select>
                </div>
                <div class="form-group">
                    <label>éکںهˆ—ç±»ه‍‹ (queueType)</label>
                    <select id="queueType">
                        <option value="LINKED_BLOCKING">LinkedBlockingQueue</option>
                        <option value="ARRAY_BLOCKING">ArrayBlockingQueue</option>
                        <option value="SYNCHRONOUS">SynchronousQueue</option>
                        <option value="PRIORITY_BLOCKING">PriorityBlockingQueue</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>éکںهˆ—é•؟ه؛¦ (queueCapacity)</label>
                    <input type="number" id="queueCapacity" min="0" max="100000">
                </div>
                <div class="form-group">
                    <label>و‹’ç»‌ç­–ç•¥ (rejectedPolicy)</label>
                    <select id="rejectedPolicy">
                        <option value="CALLER_RUNS">CallerRunsPolicy</option>
                        <option value="ABORT">AbortPolicy</option>
                        <option value="DISCARD">DiscardPolicy</option>
                        <option value="DISCARD_OLDEST">DiscardOldestPolicy</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="applyConfig()">ه؛”ç”¨é…چç½®ï¼ˆهچ³و—¶ç”ںو•ˆï¼‰</button>
                <button class="btn btn-reset" onclick="loadConfig()">é‡چç½®è،¨هچ•</button>
            </div>
            <div class="note">و‰€وœ‰ه­—و®µه‌‡هڈ¯é€‰ï¼Œن»…ن؟®و”¹ن¼ ن؛†ه€¼çڑ„é،¹م€‚و¯ڈو¬،وڈگن؛¤éƒ½ن¼ڑو›´و–°é…چç½®ه¹¶é‡چه»؛ç؛؟ç¨‹و± ï¼Œهچ³و—¶ç”ںو•ˆم€?/div>
        </div>

        <!-- هژ†هڈ²è¶‹هٹ؟ -->
        <div class="card">
            <h2>هژ†هڈ²è¶‹هٹ؟ <span class="toggle" id="trendToggle" onclick="toggleTrend()">&#9660;</span></h2>
            <div id="trendBody">
                <div class="refresh-bar">
                    <button class="btn btn-reset" onclick="refreshMetrics()" style="padding:5px 14px;">هˆ·و–°</button>
                    <select id="metricRange" onchange="refreshMetrics()" style="padding:5px 8px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;">
                        <option value="5">وœ€è؟?5 هˆ†é’ں</option>
                        <option value="15">وœ€è؟?15 هˆ†é’ں</option>
                        <option value="30">وœ€è؟?30 هˆ†é’ں</option>
                        <option value="60">وœ€è؟?1 ه°ڈو—¶</option>
                    </select>
                </div>
                <div class="chart-grid">
                    <div class="chart-box"><canvas id="chartActive"></canvas></div>
                    <div class="chart-box"><canvas id="chartQueue"></canvas></div>
                    <div class="chart-box"><canvas id="chartCompleted"></canvas></div>
                </div>
            </div>
        </div>

        <!-- è‡ھهٹ¨ن¼¸ç¼© -->
        <div class="card">
            <h2>è‡ھهٹ¨ن¼¸ç¼© <span class="toggle" id="scaleToggle" onclick="toggleScale()">&#9660;</span></h2>
            <div id="scaleBody">
                <div class="scale-row">
                    <label class="switch">
                        <input type="checkbox" id="scaleEnabled" onchange="toggleScaleEnabled()">
                        <span class="slider"></span>
                    </label>
                    <span style="font-size:13px;" id="scaleStatusLabel">هٹ è½½ن¸?..</span>
                </div>
                <div style="font-size:12px;color:#666;margin-bottom:8px;" id="scaleRules"></div>
                <div style="font-weight:600;font-size:13px;margin-bottom:4px;">ن¼¸ç¼©ن؛‹ن»¶</div>
                <div class="event-list" id="eventList"></div>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = '';
let charts = {};

function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg msg-' + type;
    setTimeout(() => { box.className = 'msg'; }, 4000);
}

function toggleTrend() {
    const body = document.getElementById('trendBody');
    const tog = document.getElementById('trendToggle');
    if (body.style.display === 'none') { body.style.display = 'block'; tog.innerHTML = '&#9660;'; refreshMetrics(); }
    else { body.style.display = 'none'; tog.innerHTML = '&#9654;'; }
}

function toggleScale() {
    const body = document.getElementById('scaleBody');
    const tog = document.getElementById('scaleToggle');
    if (body.style.display === 'none') { body.style.display = 'block'; tog.innerHTML = '&#9660;'; refreshScaleStatus(); }
    else { body.style.display = 'none'; tog.innerHTML = '&#9654;'; }
}

function validateCoreMax() {
    const core = parseInt(document.getElementById('corePoolSize').value);
    const max = parseInt(document.getElementById('maximumPoolSize').value);
    const ci = document.getElementById('corePoolSize'), mi = document.getElementById('maximumPoolSize');
    if (!isNaN(core) && !isNaN(max) && core > max) { ci.classList.add('error'); mi.classList.add('error'); return false; }
    else { ci.classList.remove('error'); mi.classList.remove('error'); return true; }
}

async function refreshInfo() {
    try {
        const resp = await fetch(API_BASE + '/executor');
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        document.getElementById('infoTable').innerHTML = buildInfoRows(data);
        document.getElementById('refreshTime').textContent = 'وœ€هگژو›´و–? ' + new Date().toLocaleTimeString();
    } catch (e) {
        document.getElementById('infoTable').innerHTML = '<tr><td colspan="2" style="text-align:center;color:#cf1322;">èژ·هڈ–çٹ¶و€په¤±è´?/td></tr>';
    }
}

function buildInfoRows(data) {
    const keys = ['و ¸ه؟ƒç؛؟ç¨‹و•?,'وœ€ه¤§ç؛؟ç¨‹و•°','ه½“ه‰چç؛؟ç¨‹و•?,'و´»è·ƒç؛؟ç¨‹و•?,'ه·²ه®Œوˆگن»»هٹ،و•°','و€»ن»»هٹ،و•°','éکںهˆ—ç±»ه‍‹','éکںهˆ—ه¤§ه°ڈ','éکںهˆ—ه‰©ن½™ه®¹é‡ڈ','ه­کو´»و—¶é—´','و‹’ç»‌ç­–ç•¥'];
    let html = '';
    keys.forEach(k => {
        const v = (data[k] != null ? data[k] : '-');
        let tag = '';
        if (k === 'و´»è·ƒç؛؟ç¨‹و•? && parseInt(v) > 0) tag = ' <span class="tag tag-green">è؟گè،Œن¸?/span>';
        else if (k === 'éکںهˆ—ه¤§ه°ڈ' && parseInt(v) > 0) tag = ' <span class="tag tag-orange">وœ‰ç§¯هژ?/span>';
        html += '<tr><td>' + k + '</td><td>' + v + tag + '</td></tr>';
    });
    return html;
}

async function loadConfig() {
    try {
        const resp = await fetch(API_BASE + '/executor/config');
        if (!resp.ok) throw new Error(await resp.text());
        const cfg = await resp.json();
        document.getElementById('corePoolSize').value = cfg.corePoolSize;
        document.getElementById('maximumPoolSize').value = cfg.maximumPoolSize;
        document.getElementById('keepAliveTime').value = cfg.keepAliveTime;
        document.getElementById('timeUnit').value = cfg.timeUnit;
        document.getElementById('queueType').value = cfg.queueType;
        document.getElementById('queueCapacity').value = cfg.queueCapacity;
        document.getElementById('rejectedPolicy').value = cfg.rejectedPolicy;
        validateCoreMax();
    } catch (e) { showMsg('èژ·هڈ–é…چç½®ه¤±è´¥: ' + e.message, 'error'); }
}

async function applyConfig() {
    if (!validateCoreMax()) { showMsg('و ¸ه؟ƒç؛؟ç¨‹و•°ن¸چèƒ½ه¤§ن؛ژوœ€ه¤§ç؛؟ç¨‹و•°', 'error'); return; }
    const btn = document.querySelector('#configCard .btn-primary');
    btn.disabled = true; btn.textContent = 'وڈگن؛¤ن¸?..';
    try {
        const dto = {
            corePoolSize: parseInt(document.getElementById('corePoolSize').value),
            maximumPoolSize: parseInt(document.getElementById('maximumPoolSize').value),
            keepAliveTime: parseInt(document.getElementById('keepAliveTime').value),
            timeUnit: document.getElementById('timeUnit').value,
            queueType: document.getElementById('queueType').value,
            queueCapacity: parseInt(document.getElementById('queueCapacity').value),
            rejectedPolicy: document.getElementById('rejectedPolicy').value
        };
        const resp = await fetch(API_BASE + '/executor/config', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dto)
        });
        if (!resp.ok) {
            const txt = await resp.text(); let msg = txt;
            try { msg = JSON.parse(txt).message || txt; } catch (_) {}
            throw new Error(msg);
        }
        showMsg('é…چç½®ه·²هچ³و—¶ç”ںو•ˆï¼پ', 'success');
        await loadConfig(); await refreshInfo();
    } catch (e) { showMsg('ه؛”ç”¨é…چç½®ه¤±è´¥: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'ه؛”ç”¨é…چç½®ï¼ˆهچ³و—¶ç”ںو•ˆï¼‰'; }
}

/* ========== هژ†هڈ²è¶‹هٹ؟ ========== */
function makeChart(id, label, color) {
    const ctx = document.getElementById(id).getContext('2d');
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: label, data: [], borderColor: color, borderWidth: 2, pointRadius: 0, fill: false, tension: 0.2 }] },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { font: { size: 10 }, color: '#666' } } },
            scales: {
                x: { display: false },
                y: { ticks: { font: { size: 9 } } }
            }
        }
    });
}

async function refreshMetrics() {
    const mins = document.getElementById('metricRange').value;
    try {
        const resp = await fetch(API_BASE + '/executor/metrics/history?minutes=' + mins);
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        if (!charts.chartActive) { makeChart('chartActive', 'و´»è·ƒç؛؟ç¨‹و•?, '#4a6cf7'); makeChart('chartQueue', 'éکںهˆ—ه¤§ه°ڈ', '#e65100'); makeChart('chartCompleted', 'ه·²ه®Œوˆگن»»هٹ،و•°', '#2e7d32'); }
        const labels = data.map(d => new Date(d.createTime).toLocaleTimeString());
        updateChart('chartActive', labels, data.map(d => d.activeCount));
        updateChart('chartQueue', labels, data.map(d => d.queueSize));
        updateChart('chartCompleted', labels, data.map(d => d.completedTaskCount));
    } catch (e) {}
}

function updateChart(id, labels, values) {
    const c = charts[id];
    if (!c) return;
    c.data.labels = labels;
    c.data.datasets[0].data = values;
    c.update();
}

/* ========== è‡ھهٹ¨ن¼¸ç¼© ========== */
async function refreshScaleStatus() {
    try {
        const resp = await fetch(API_BASE + '/executor/scale/status');
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        document.getElementById('scaleEnabled').checked = data.enabled;
        document.getElementById('scaleStatusLabel').textContent = data.enabled ? 'ه·²هگ¯ç”? : 'ه·²هپœç”?;
        const rules = data.scaleUp && data.scaleDown
            ? 'و‰©ه®¹: éکںهˆ—ن½؟ç”¨çژ?' + data.scaleUp.queueUsagePercent + '% â†?+' + data.scaleUp.delta
              + ' | ç¼©ه®¹: و´»è·ƒهچ و¯”<' + (data.scaleDown.activeThreadRatio*100) + '% è؟‍ç»­' + data.scaleDown.consecutiveChecks + 'و¬?
            : '';
        document.getElementById('scaleRules').textContent = rules;
    } catch (e) { document.getElementById('scaleStatusLabel').textContent = 'èژ·هڈ–ه¤±è´¥'; }
}

async function refreshScaleHistory() {
    try {
        const resp = await fetch(API_BASE + '/executor/scale/history');
        if (!resp.ok) throw new Error(await resp.text());
        const events = await resp.json();
        const el = document.getElementById('eventList');
        if (events.length === 0) { el.innerHTML = '<div class="event-item" style="color:#999;">وڑ‚و— ن¼¸ç¼©ن؛‹ن»¶</div>'; return; }
        el.innerHTML = events.slice().reverse().map(e => {
            const cls = e.direction === 'UP' ? 'event-dir-up' : 'event-dir-down';
            const arrow = e.direction === 'UP' ? '&#8593; و‰©ه®¹' : '&#8595; ç¼©ه®¹';
            return '<div class="event-item"><span class="event-time">' + new Date(e.time).toLocaleTimeString() + '</span>'
                + '<span class="' + cls + '">' + arrow + '</span>'
                + '<span>core:' + e.oldCore + 'â†? + e.newCore + ' max:' + e.oldMax + 'â†? + e.newMax + '</span>'
                + '<span style="font-size:11px;color:#999;">' + e.reason + '</span></div>';
        }).join('');
    } catch (e) {}
}

async function toggleScaleEnabled() {
    const checked = document.getElementById('scaleEnabled').checked;
    try {
        await fetch(API_BASE + '/executor/scale/status', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled: checked })
        });
        document.getElementById('scaleStatusLabel').textContent = checked ? 'ه·²هگ¯ç”? : 'ه·²هپœç”?;
    } catch (e) { showMsg('هˆ‡وچ¢ه¤±è´¥: ' + e.message, 'error'); document.getElementById('scaleEnabled').checked = !checked; }
}

function refreshAllScale() { refreshScaleStatus().then(refreshScaleHistory); }

loadConfig();
refreshInfo();
refreshAllScale();
</script>
</body>
</html>
